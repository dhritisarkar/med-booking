<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clinic Management System</title>

    <link rel="stylesheet" href="assets/style.css">

</head>

<body>

<script>
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "login.html";
    }
</script>

<header class="header">

    <div class="header-content">

        <h1>Clinic Management System</h1>

        <p>Appointment Scheduling & Patient Record Management</p>

    </div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</header>

<div class="container">

    <!-- Dashboard Statistics -->

    <section class="stats-container">

        <div class="stat-card">
            <h3>Total Doctors</h3>
            <p id="doctorCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Patients</h3>
            <p id="patientCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Appointments</h3>
            <p id="appointmentCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Today's Date</h3>
            <p id="todayDate"></p>
        </div>

        <div class="stat-card">
            <h3>Today's Appointments</h3>
            <p id="todayCount">0</p>
        </div>

    </section>

    <!-- Navigation -->

    <div class="tabs">

        <button class="tab-btn active"
                onclick="showSection('doctors', this)">
            Doctors
        </button>

        <button class="tab-btn"
                onclick="showSection('patients', this)">
            Patients
        </button>

        <button class="tab-btn"
                onclick="showSection('appointments', this)">
            Appointments
        </button>

    </div>

    <!-- Doctors -->

    <section class="card section-card" id="doctors">

        <h2>Doctors</h2>

        <div class="flex-row">

            <input
                    id="doctorName"
                    type="text"
                    placeholder="Doctor Name">

            <button onclick="addDoctor()">
                Add Doctor
            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="doctorTable"></tbody>

            </table>

        </div>

    </section>

    <!-- Patients -->

    <section class="card section-card" id="patients">

        <h2>Patients</h2>

        <div class="flex-row">

            <input
                    id="search"
                    placeholder="Search Patient..."
                    onkeyup="loadPatients()">

            <input
                    id="patientName"
                    placeholder="Patient Name">

            <select id="patientGender">

                <option value="">Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>

            </select>

            <input
                    id="patientPhone"
                    placeholder="Phone Number">

            <button onclick="addPatient()">
                Add Patient
            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>#</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="patientTable"></tbody>

            </table>

        </div>

    </section>

    <!-- Appointments -->

    <section class="card section-card" id="appointments">

        <h2>Appointments</h2>

        <div class="flex-row">

            <input
                    type="date"
                    id="date">

            <select id="time">

                <option value="">Time</option>

                <option value="11:00:00">11:00 AM</option>
                <option value="11:30:00">11:30 AM</option>
                <option value="12:00:00">12:00 PM</option>
                <option value="13:00:00">1:00 PM</option>
                <option value="13:30:00">1:30 PM</option>
                <option value="14:00:00">2:00 PM</option>
                <option value="14:30:00">2:30 PM</option>
                <option value="15:00:00">3:00 PM</option>
                <option value="15:30:00">3:30 PM</option>
                <option value="16:00:00">4:00 PM</option>

            </select>

            <select id="patientId"></select>

            <select id="doctorId"></select>

            <button onclick="bookAppointment()">
                Book Appointment
            </button>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date & Time</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="appointmentTable"></tbody>

            </table>

        </div>

    </section>

</div>


<script src="./assets/config.js"></script>
<script src="./assets/script.js"></script>

<div id="toast"></div>

</body>

</html>
