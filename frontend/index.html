<!DOCTYPE html>
<html>
<head>
    <title>Clinic Management System</title>

    <style>
        body {
            font-family: Arial;
            background:#eef7fc;
            margin:0;
            padding:0;
            text-align:center;
        }

        h1 {
            background:#a7d8f0;
            padding:15px;
            margin:0;
        }

        .container {
            width:85%;
            margin:auto;
        }

        /* CARDS */
        .card {
            background:white;
            margin:20px auto;
            padding:20px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        /* TABLE */
        table {
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
        }

        th {
            background:#a7d8f0;
        }

        td, th {
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        /* INPUTS */
        input, select {
            padding:8px;
            margin:5px;
            border:1px solid #c8e3f2;
            border-radius:4px;
        }

        /* BUTTONS */
        button {
            padding:7px 12px;
            margin:4px;
            border:none;
            border-radius:4px;
            cursor:pointer;
            background:#a7d8f0;
        }

        button:hover {
            background:#8cc9e8;
        }

        /* DELETE BUTTON */
        .delete-btn {
            background:#ff6b6b;
            color:white;
        }

        .delete-btn:hover {
            background:#e05555;
        }

        /* LOGOUT BUTTON */
        .logout-btn {
            position:absolute;
            top:15px;
            right:20px;
            background:#ff4d4d;
            color:white;
        }

        /* FLEX ROW */
        .flex-row {
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:10px;
            margin-bottom:10px;
        }

        /* MODAL */
        .modal {
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
        }

        .modal-content {
            background:white;
            margin:10% auto;
            padding:20px;
            width:300px;
            border-radius:8px;
        }
    </style>
</head>

<body>

<script>
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "login.html";
    }
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<h1>Clinic Management System</h1>

<div class="container">

    <!-- DOCTORS -->
    <div class="card">
        <h2>Doctors</h2>

        <div class="flex-row">
            <input type="text" id="doctorName" placeholder="Doctor Name">
            <button onclick="addDoctor()">Add Doctor</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="doctorTable"></tbody>
        </table>
    </div>

    <!-- PATIENTS -->
    <div class="card">
        <h2>Patients</h2>

        <div class="flex-row">

            <input type="text" id="search" placeholder="Search patient..." onkeyup="loadPatients()">

            <input id="patientName" placeholder="Name">
            <input id="patientGender" placeholder="Gender">
            <input id="patientPhone" placeholder="Phone">

            <button onclick="addPatient()">Add Patient</button>

        </div>

        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>
    </div>

    <!-- APPOINTMENTS -->
    <div class="card">
        <h2>Appointments</h2>

        <div class="flex-row">
            <input type="date" id="date">
            <input type="time" id="time">

            <select id="patientId"></select>
            <select id="doctorId"></select>

            <button onclick="bookAppointment()">Book Appointment</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date & Time</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="appointmentTable"></tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Edit Patient</h3>

        <input id="editName"><br>
        <input id="editGender"><br>
        <input id="editPhone"><br><br>

        <button onclick="saveEdit()">Save</button>
        <button onclick="closeModal()">Cancel</button>

    </div>
</div>

<script>

    function logout(){
        localStorage.removeItem("loggedIn");
        window.location.href="login.html";
    }

    let editId = null;

    // LOAD DOCTORS
    async function loadDoctors(){
        const res = await fetch("http://localhost:3000/doctors");
        const data = await res.json();

        doctorTable.innerHTML="";
        doctorId.innerHTML="";

        data.forEach(d=>{
            doctorTable.innerHTML+=`
            <tr>
            <td>${d.doctor_id}</td>
            <td>${d.name}</td>
            <td>
                <button onclick="editDoctor(${d.doctor_id},'${d.name}')">Edit</button>
            </td>
            </tr>`;

            doctorId.innerHTML+=`<option value="${d.doctor_id}">${d.name}</option>`;
        });
    }

    // LOAD PATIENTS
    async function loadPatients(){
        const search = document.getElementById("search").value;

        const res = await fetch(`http://localhost:3000/patients?search=${search}`);
        const data = await res.json();

        patientTable.innerHTML="";
        patientId.innerHTML="";

        data.forEach((p,i)=>{
            patientTable.innerHTML+=`
            <tr>
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${p.gender}</td>
            <td>${p.phone}</td>
            <td>
            <button onclick="openEdit(${p.patient_id},'${p.name}','${p.gender}','${p.phone}')">Edit</button>
            <button class="delete-btn" onclick="deletePatient(${p.patient_id})">Delete</button>
            </td>
            </tr>`;

            patientId.innerHTML+=`<option value="${p.patient_id}">${p.name}</option>`;
        });
    }

    // LOAD APPOINTMENTS
    async function loadAppointments(){
        const res = await fetch("http://localhost:3000/appointments");
        const data = await res.json();

        appointmentTable.innerHTML="";

        data.forEach(a=>{
            appointmentTable.innerHTML+=`
            <tr>
            <td>${a.appointment_id}</td>
            <td>${a.patient_name}</td>
            <td>${a.doctor_name}</td>
            <td>${new Date(a.appointment_date).toLocaleString()}</td>
            <td>
                <button class="delete-btn" onclick="deleteAppointment(${a.appointment_id})">Delete</button>
            </td>
            </tr>`;
        });
    }

    // ADD FUNCTIONS
    async function addPatient(){
        await fetch("http://localhost:3000/add-patient",{
            method:"POST",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({
                name:patientName.value,
                gender:patientGender.value,
                phone:patientPhone.value
            })
        });
        loadPatients();
    }

    async function addDoctor(){
        await fetch("http://localhost:3000/add-doctor",{
            method:"POST",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({name:doctorName.value})
        });
        loadDoctors();
    }

    async function bookAppointment(){
        const appointment_date = date.value + " " + time.value;

        await fetch("http://localhost:3000/add-appointment",{
            method:"POST",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({
                patient_id:patientId.value,
                doctor_id:doctorId.value,
                appointment_date
            })
        });
        loadAppointments();
    }

    // EDIT
    function openEdit(id,name,gender,phone){
        editId=id;
        editName.value=name;
        editGender.value=gender;
        editPhone.value=phone;
        modal.style.display="block";
    }

    function closeModal(){
        modal.style.display="none";
    }

    function saveEdit(){
        fetch(`http://localhost:3000/update-patient/${editId}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({
                name:editName.value,
                gender:editGender.value,
                phone:editPhone.value
            })
        }).then(()=>{
            closeModal();
            loadPatients();
        });
    }

    function editDoctor(id,name){
        const newName = prompt("New name:", name);

        fetch(`http://localhost:3000/update-doctor/${id}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json"},
            body:JSON.stringify({name:newName})
        }).then(loadDoctors);
    }

    // DELETE
    function deletePatient(id){
        fetch(`http://localhost:3000/delete-patient/${id}`,{method:"DELETE"})
        .then(()=>{
            loadPatients();
            loadAppointments();
        });
    }

    function deleteAppointment(id){
        fetch(`http://localhost:3000/delete-appointment/${id}`,{method:"DELETE"})
        .then(loadAppointments);
    }

    // INIT
    loadDoctors();
    loadPatients();
    loadAppointments();

</script>

</body>
</html>
