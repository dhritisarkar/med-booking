<!DOCTYPE html>
<html>
<head>
    <title>Clinic Management System</title>

    <style>

        body{
        font-family: Arial, sans-serif;
        background:#f6fbfe;
        margin:0;
        padding:0;
        }

        .container{
        width:80%;
        margin:auto;
        text-align:center;
        }

        h1{
        background:#a7d8f0;
        color:#2a4a5e;
        padding:20px;
        margin-bottom:30px;
        }

        /* DASHBOARD */

        .dashboard{
        display:flex;
        justify-content:center;
        gap:25px;
        margin-bottom:30px;
        }

        .dashboard-card{
        background:white;
        padding:20px 35px;
        border-radius:10px;
        box-shadow:0 2px 6px rgba(0,0,0,0.08);
        min-width:180px;
        }

        .dashboard-card h3{
        margin:0;
        color:#2a4a5e;
        }

        .dashboard-card p{
        font-size:28px;
        margin-top:10px;
        color:#5aaed6;
        font-weight:bold;
        }

        /* CARDS */

        .card{
        background:white;
        padding:20px;
        margin-bottom:25px;
        border-radius:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        /* TABLE */

        table{
        width:100%;
        border-collapse:collapse;
        margin-top:15px;
        }

        th{
        background:#a7d8f0;
        color:#2a4a5e;
        padding:10px;
        }

        td{
        padding:10px;
        border-bottom:1px solid #e3eef5;
        }

        tr:hover{
        background:#eef7fc;
        }

        /* INPUTS */

        input,select{
        padding:8px;
        margin:5px;
        border:1px solid #c8e3f2;
        border-radius:4px;
        }

        /* BUTTONS */

        button{
        background:#a7d8f0;
        color:#2a4a5e;
        border:none;
        padding:8px 14px;
        border-radius:4px;
        cursor:pointer;
        font-weight:500;
        }

        button:hover{
        background:#8cc9e8;
        }

        .delete-btn{
        background:#ff6b6b;
        color:white;
        }

        .delete-btn:hover{
        background:#e05656;
        }

    </style>

</head>

<body>

<h1>Clinic Management System</h1>

<!-- DASHBOARD -->

<div class="dashboard">

    <div class="dashboard-card">
        <h3>Total Doctors</h3>
        <p id="doctorCount">0</p>
    </div>

    <div class="dashboard-card">
        <h3>Total Patients</h3>
        <p id="patientCount">0</p>
    </div>

    <div class="dashboard-card">
        <h3>Total Appointments</h3>
        <p id="appointmentCount">0</p>
    </div>

</div>

<div class="container">

    <!-- DOCTORS TABLE -->

    <div class="card">

        <h2>Doctors List</h2>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
            </thead>

            <tbody id="doctorTableBody"></tbody>

        </table>

    </div>

    <!-- ADD DOCTOR -->

    <div class="card">

        <h2>Add Doctor</h2>

        <input type="text" id="doctorName" placeholder="Doctor Name">

        <br>

        <button onclick="addDoctor()">Add Doctor</button>

        <p id="doctorMessage" style="color:green;"></p>

    </div>


    <!-- ADD PATIENT -->

    <div class="card">

        <h2>Add Patient</h2>

        <input type="text" id="patientName" placeholder="Name">

        <select id="patientGender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>

        <input type="text" id="patientPhone" placeholder="Phone">

        <br>

        <button onclick="addPatient()">Add Patient</button>

        <p id="message" style="color:green;"></p>

    </div>


    <!-- PATIENT TABLE -->

    <div class="card">

        <h2>All Patients</h2>

        <table>

            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="patientTableBody"></tbody>

        </table>

    </div>


    <!-- BOOK APPOINTMENT -->

    <div class="card">

        <h2>Book Appointment</h2>

        <input type="date" id="appointmentDate">

        <select id="appointmentTime">
            <option value="">Select Time Slot</option>
            <option value="09:00:00">09:00 AM</option>
            <option value="10:00:00">10:00 AM</option>
            <option value="11:00:00">11:00 AM</option>
            <option value="14:00:00">02:00 PM</option>
            <option value="15:00:00">03:00 PM</option>
        </select>

        <select id="patientId">
            <option value="">Select Patient</option>
        </select>

        <select id="doctorId">
            <option value="">Select Doctor</option>
        </select>

        <br>

        <button onclick="bookAppointment()">Book Appointment</button>

    </div>


    <!-- APPOINTMENT TABLE -->

    <div class="card">

        <h2>All Appointments</h2>

        <table>

            <thead>
            <tr>
                <th>Appointment ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date & Time</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="appointmentTableBody"></tbody>

        </table>

    </div>

</div>


<script>


    async function loadDoctors(){

    const response=await fetch("http://localhost:3000/doctors");
    const data=await response.json();

    document.getElementById("doctorCount").textContent=data.length;

    const table=document.getElementById("doctorTableBody");
    table.innerHTML="";

    data.forEach(doc=>{

    table.innerHTML+=`
    <tr>
    <td>${doc.doctor_id}</td>
    <td>${doc.name}</td>
    </tr>
    `;

    });

    populateDoctorDropdown(data);

    }


    function populateDoctorDropdown(doctors){

    const dropdown=document.getElementById("doctorId");

    dropdown.innerHTML='<option value="">Select Doctor</option>';

    doctors.forEach(doc=>{

    const option=document.createElement("option");
    option.value=doc.doctor_id;
    option.textContent=doc.name;

    dropdown.appendChild(option);

    });

    }


    function populatePatientDropdown(patients){

    const dropdown=document.getElementById("patientId");

    dropdown.innerHTML='<option value="">Select Patient</option>';

    patients.forEach(patient=>{

    const option=document.createElement("option");
    option.value=patient.patient_id;
    option.textContent=patient.name;

    dropdown.appendChild(option);

    });

    }


    async function loadPatients(){

    const response=await fetch("http://localhost:3000/patients");
    const data=await response.json();

    document.getElementById("patientCount").textContent=data.length;

    populatePatientDropdown(data);

    const table=document.getElementById("patientTableBody");
    table.innerHTML="";

    data.forEach((patient,index)=>{

    table.innerHTML+=`
    <tr>
    <td>${index+1}</td>
    <td>${patient.name}</td>
    <td>${patient.gender}</td>
    <td>${patient.phone}</td>
    <td>
    <button class="delete-btn" onclick="deletePatient(${patient.patient_id})">Delete</button>
    </td>
    </tr>
    `;

    });

    }


    async function addDoctor(){

    const name=document.getElementById("doctorName").value;

    if(!name){
    alert("Please enter doctor name");
    return;
    }

    await fetch("http://localhost:3000/add-doctor",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({name})

    });

    document.getElementById("doctorMessage").textContent="Doctor added successfully";

    document.getElementById("doctorName").value="";

    loadDoctors();

    }


    async function addPatient(){

    const name=document.getElementById("patientName").value;
    const gender=document.getElementById("patientGender").value;
    const phone=document.getElementById("patientPhone").value;

    if(!name||!gender||!phone){
    alert("Please fill all fields");
    return;
    }

    await fetch("http://localhost:3000/add-patient",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({name,gender,phone})

    });

    document.getElementById("message").textContent="Patient added successfully";

    loadPatients();

    }


    async function bookAppointment(){

    const date=document.getElementById("appointmentDate").value;
    const time=document.getElementById("appointmentTime").value;
    const patient_id=document.getElementById("patientId").value;
    const doctor_id=document.getElementById("doctorId").value;

    if(!date||!time||!patient_id||!doctor_id){
    alert("Please fill all fields");
    return;
    }

    const appointment_date=date+" "+time;

    await fetch("http://localhost:3000/add-appointment",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({patient_id,doctor_id,appointment_date})

    });

    loadAppointments();

    }


    async function deleteAppointment(id){

    if(!confirm("Delete this appointment?")) return;

    await fetch(`http://localhost:3000/delete-appointment/${id}`,{
    method:"DELETE"
    });

    loadAppointments();

    }


    async function deletePatient(id){

    if(!confirm("Deleting this patient will remove all appointments. Continue?")) return;

    await fetch(`http://localhost:3000/delete-patient/${id}`,{
    method:"DELETE"
    });

    loadPatients();
    loadAppointments();

    }


    async function loadAppointments(){

    const response=await fetch("http://localhost:3000/appointments");
    const data=await response.json();

    document.getElementById("appointmentCount").textContent=data.length;

    const table=document.getElementById("appointmentTableBody");
    table.innerHTML="";

    data.forEach(app=>{

    const formattedDate=new Date(app.appointment_date).toLocaleString();

    table.innerHTML+=`
    <tr>
    <td>${app.appointment_id}</td>
    <td>${app.patient_name}</td>
    <td>${app.doctor_name}</td>
    <td>${formattedDate}</td>
    <td>
    <button class="delete-btn" onclick="deleteAppointment(${app.appointment_id})">Delete</button>
    </td>
    </tr>
    `;

    });

    }


    loadDoctors();
    loadPatients();
    loadAppointments();

</script>

</body>
</html>
